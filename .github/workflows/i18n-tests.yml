name: i18n Tests

on:
  pull_request:
    branches:
      - main
      - 1.x
      - 2.x
  push:
    branches:
      - main
      - 1.x
      - 2.x


concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  RAILS_ENV: test
  PGHOST: localhost
  PGUSER: postgres
  PGPORT: 5432
  POSTGRES_HOST: localhost
  POSTGRES_USERNAME: postgres
  POSTGRES_PORT: 5432
  BUNDLE_PATH_RELATIVE_TO_CWD: true
  AVO_LICENSE_KEY: license_123
  COVERAGE: true

jobs:
  i18n_tests:
    strategy:
      matrix:
        ruby: ['3.4']
        rails: ['8.0']
    runs-on: ubuntu-latest

    env:
      RAILS_VERSION: ${{matrix.rails}}
      BUNDLE_GEMFILE: ${{ github.workspace }}/gemfiles/rails_${{ matrix.rails }}_ruby_${{ matrix.ruby }}.gemfile

    services:
      postgres:
        image: postgres:10.8
        ports: ["5432:5432"]
        options: --health-cmd pg_isready --health-interval 10s --health-timeout 5s --health-retries 5

    steps:
    - uses: actions/checkout@v4

    - name: Set up Ruby
      uses: ruby/setup-ruby@v1
      with:
        bundler-cache: true
        bundler: default
        ruby-version: ${{ matrix.ruby }}

    - name: Prepare database
      run: |
        bin/rails db:create
        bin/rails db:migrate

    - name: Run tests
      id: run_tests
      run: bundle exec rspec spec/system/i18n_spec.rb

    - uses: actions/upload-artifact@v4
      with:
        name: coverage_system_${{ matrix.rails }}_ruby_${{ matrix.ruby }}
        path: coverage/.resultset.json

    - uses: actions/upload-artifact@v4
      if: always() && steps.run_tests.outcome == 'failure'
      with:
        name: rspec_failed_screenshots_rails_${{ matrix.rails }}_ruby_${{ matrix.ruby }}
        path: ./spec/dummy/tmp/screenshots
